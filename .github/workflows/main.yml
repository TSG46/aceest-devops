name: ACEest CI Pipeline

on:
  push:
  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install flask pytest

    - name: Run Tests
      run: |
        python -m pytest

    - name: Build Docker Image
      run: |
        docker build -t aceest-app .